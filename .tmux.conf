# ── prefix: Ctrl+a (easier than Ctrl+b) ────────────────────
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# ── new window: Ctrl+a t  ───────────────────────────────────
bind t new-window -c "#{pane_current_path}"
bind c clock-mode

# ── splits (open in current dir) ────────────────────────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# ── pane navigation (arrow keys or vim hjkl) ────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ── pane resize ─────────────────────────────────────────────
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── scroll with PgUp ────────────────────────────────────────
bind -n PgUp copy-mode -u

# ── vi copy mode ────────────────────────────────────────────
set-window-option -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# ── quality of life ─────────────────────────────────────────
set -g mouse on
set -g history-limit 10000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -sg escape-time 0
set -g focus-events on

# ── theme ───────────────────────────────────────────────────
set -g status-style                 'bg=#1a0a2e fg=#9c6fc0'
set -g status-left                  '#[fg=#c084fc,bold] #S '
set -g status-left-length           20
set -g status-right                 '#[fg=#a78bfa] %H:%M '
set -g status-right-length          20
set -g window-status-format         '#[fg=#6b4a8a] #I:#W '
set -g window-status-current-format '#[fg=#e879f9,bold,bg=#2d1b69] #I:#W '
set -g pane-border-style            'fg=#3b1f5e'
set -g pane-active-border-style     'fg=#a855f7'
set -g message-style                'bg=#2d1b69 fg=#e879f9,bold'

# ── reload config: Ctrl+a r ─────────────────────────────────
bind r source-file ~/.tmux.conf \; display "config reloaded!"
